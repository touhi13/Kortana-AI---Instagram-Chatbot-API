info:
  name: Book Time Slot
  type: http
  seq: 3

http:
  method: POST
  url: "{{base_url}}/api/v1/public/book/{{booking_token}}"
  headers:
    - name: Content-Type
      value: application/json
    - name: Accept
      value: application/json
  body:
    type: json
    data: |-
      {
        "scheduled_at": "2025-12-20T14:00:00Z",
        "timezone": "America/New_York"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Book a time slot. Creates Google Calendar event and sends confirmation email. No authentication required.
