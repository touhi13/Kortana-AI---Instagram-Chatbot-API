info:
  name: Get Savings Calculator
  type: http
  seq: 3

http:
  method: GET
  url: "{{base_url}}/api/v1/public/savings-calculator"
  headers:
    - name: Accept
      value: application/json
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Get subscription packages data for the savings calculator. Returns active packages with pricing and limits. No authentication required.
