info:
  name: Get Demo Config
  type: http
  seq: 1

http:
  method: GET
  url: "{{base_url}}/api/v1/public/demo/config"
  headers:
    - name: Accept
      value: application/json
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Get the demo chatbot configuration including agent name, company name, services, initial greeting suggestions, and a sample conversation. Used by the frontend to render the demo chat widget dynamically. No authentication required.
