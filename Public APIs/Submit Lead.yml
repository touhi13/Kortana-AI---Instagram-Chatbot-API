info:
  name: Submit Lead
  type: http
  seq: 4

http:
  method: POST
  url: "{{base_url}}/api/v1/public/leads"
  headers:
    - name: Content-Type
      value: application/json
    - name: Accept
      value: application/json
  body:
    type: json
    data: |-
      {
        "first_name": "John",
        "last_name": "Doe",
        "email": "john.doe@example.com",
        "message": "I'm interested in learning more about your AI appointment booking system."
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Submit a lead from the landing page. No authentication required.
