info:
  name: Update Support Ticket (Admin)
  type: http
  seq: 4

http:
  method: PUT
  url: "{{base_url}}/api/v1/admin/support-ticket/1"
  headers:
    - name: Authorization
      value: Bearer {{admin_auth_token}}
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "id": 1,
        "priority": "high",
        "status": "resolved"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: "Admin: Update support ticket priority and status"
