info:
  name: Add Message to Support Ticket (Admin)
  type: http
  seq: 3

http:
  method: POST
  url: "{{base_url}}/api/v1/admin/support-ticket/message"
  headers:
    - name: Authorization
      value: Bearer {{admin_auth_token}}
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "message": "Thank you for contacting us. We have resolved your issue.",
        "ticket_id": 1
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: "Admin: Add a message to a support ticket"
