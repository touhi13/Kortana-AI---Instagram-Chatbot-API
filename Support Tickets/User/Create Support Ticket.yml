info:
  name: Create Support Ticket
  type: http
  seq: 3

http:
  method: POST
  url: "{{base_url}}/api/v1/support-ticket"
  headers:
    - name: Authorization
      value: Bearer {{auth_token}}
    - name: Content-Type
      value: application/json
    - name: Accept
      value: application/json
  body:
    type: json
    data: |-
      {
        "subject": "Technical Issue",
        "message": "I'm experiencing a technical issue with the platform. The login page is not loading properly."
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: "User: Create a new support ticket"
