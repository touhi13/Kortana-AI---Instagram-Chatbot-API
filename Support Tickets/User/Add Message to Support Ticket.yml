info:
  name: Add Message to Support Ticket
  type: http
  seq: 4

http:
  method: POST
  url: "{{base_url}}/api/v1/support-ticket/message"
  headers:
    - name: Authorization
      value: Bearer {{auth_token}}
    - name: Content-Type
      value: application/json
    - name: Accept
      value: application/json
  body:
    type: json
    data: |-
      {
        "message": "Thank you for your help. The issue has been resolved.",
        "ticket_id": 1
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: "User: Add a message to an existing support ticket"
