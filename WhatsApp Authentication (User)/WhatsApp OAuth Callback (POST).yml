info:
  name: WhatsApp OAuth Callback (POST)
  type: http
  seq: 3

http:
  method: POST
  url: "{{base_url}}/api/v1/auth/whatsapp/callback"
  headers:
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
  body:
    type: json
    json:
      code: AUTH_CODE
      state: STATE_VALUE
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

