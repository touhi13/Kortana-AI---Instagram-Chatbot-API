info:
  name: WhatsApp Connection Status
  type: http
  seq: 4

http:
  method: GET
  url: "{{base_url}}/api/v1/auth/whatsapp/status"
  headers:
    - name: Authorization
      value: Bearer {{auth_token}}
    - name: Accept
      value: application/json
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

