info:
  name: Refresh WhatsApp Token
  type: http
  seq: 6

http:
  method: POST
  url: "{{base_url}}/api/v1/auth/whatsapp/refresh"
  headers:
    - name: Authorization
      value: Bearer {{auth_token}}
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

