info:
  name: Get All Subscription Packages
  type: http
  seq: 1

http:
  method: GET
  url: "{{base_url}}/api/v1/admin/packages?page=1&per_page=10&include_statistics=true"
  headers:
    - name: Authorization
      value: Bearer {{admin_auth_token}}
    - name: Accept
      value: application/json
  params:
    - name: page
      value: "1"
      type: query
      description: Page number
    - name: per_page
      value: "10"
      type: query
      description: Items per page
    - name: search
      value: ""
      type: query
      description: Search term
      disabled: true
    - name: is_active
      value: ""
      type: query
      description: Filter by active status (true/false)
      disabled: true
    - name: billing_cycle
      value: ""
      type: query
      description: Filter by billing cycle (month/year/day/week)
      disabled: true
    - name: price_min
      value: ""
      type: query
      description: Minimum price filter
      disabled: true
    - name: price_max
      value: ""
      type: query
      description: Maximum price filter
      disabled: true
    - name: include_statistics
      value: "true"
      type: query
      description: Include statistics in response
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Get all subscription packages with pagination and filtering options
