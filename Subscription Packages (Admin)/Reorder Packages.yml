info:
  name: Reorder Packages
  type: http
  seq: 8

http:
  method: POST
  url: "{{base_url}}/api/v1/admin/packages/reorder"
  headers:
    - name: Authorization
      value: Bearer {{admin_auth_token}}
    - name: Content-Type
      value: application/json
    - name: Accept
      value: application/json
  body:
    type: json
    data: |-
      {
        "packages": [
          {
            "id": 1,
            "sort_order": 3
          },
          {
            "id": 2,
            "sort_order": 1
          },
          {
            "id": 3,
            "sort_order": 2
          }
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Reorder subscription packages by updating their sort_order values
