info:
  name: Assign Discount to Package
  type: http
  seq: 9

http:
  method: PUT
  url: "{{base_url}}/api/v1/admin/packages/1/assign-discount"
  headers:
    - name: Authorization
      value: Bearer {{admin_auth_token}}
    - name: Content-Type
      value: application/json
    - name: Accept
      value: application/json
  body:
    type: json
    data: |-
      {
        "monthly_discount_id": 1,
        "monthly_discount_starts_at": "2026-03-01 00:00:00",
        "monthly_discount_ends_at": "2026-12-31 23:59:59",
        "yearly_discount_id": 2,
        "yearly_discount_starts_at": "2026-03-01 00:00:00",
        "yearly_discount_ends_at": "2026-12-31 23:59:59"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Assign or remove discounts from a subscription package. Set monthly_discount_id/yearly_discount_id to assign discounts (null to remove). Optionally set monthly_discount_ends_at/yearly_discount_ends_at (datetime) for auto-expiry. Only fields present in the request are updated.
