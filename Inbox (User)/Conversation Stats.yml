info:
  name: Conversation Stats
  type: http
  seq: 5

http:
  method: GET
  url: "{{base_url}}/api/v1/conversations/stats"
  headers:
    - name: Authorization
      value: Bearer {{auth_token}}
    - name: Accept
      value: application/json
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Get inbox conversation statistics for the authenticated user
