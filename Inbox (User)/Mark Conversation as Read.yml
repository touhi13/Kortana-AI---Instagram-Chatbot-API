info:
  name: Mark Conversation as Read
  type: http
  seq: 10

http:
  method: PUT
  url: "{{base_url}}/api/v1/conversations/1/read"
  headers:
    - name: Authorization
      value: Bearer {{auth_token}}
    - name: Accept
      value: application/json
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

