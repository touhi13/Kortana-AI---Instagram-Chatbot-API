http:
  method: GET
  url: "{{base_url}}/api/v1/conversations/1/appointments"
  headers:
    - name: Authorization
      value: Bearer {{auth_token}}
    - name: Accept
      value: application/json
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Get appointments linked to a conversation by ID
