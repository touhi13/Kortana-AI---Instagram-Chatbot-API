info:
  name: Get Conversation Messages
  type: http
  seq: 8

http:
  method: GET
  url: "{{base_url}}/api/v1/conversations/1/messages?per_page=30"
  headers:
    - name: Authorization
      value: Bearer {{auth_token}}
    - name: Accept
      value: application/json
  params:
    - name: per_page
      value: "30"
      type: query
      description: "Messages per page (default: 30)"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Get paginated conversation messages by conversation ID
