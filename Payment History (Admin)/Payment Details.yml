info:
  name: Payment Details
  type: http
  seq: 2

http:
  method: GET
  url: "{{base_url}}/api/v1/admin/subscriptions/:id"
  headers:
    - name: Authorization
      value: Bearer {{admin_auth_token}}
    - name: Accept
      value: application/json
  params:
    - name: id
      value: ""
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
