info:
  name: Get User Profile
  type: http
  seq: 3

http:
  method: GET
  url: "{{base_url}}/api/v1/auth/user"
  headers:
    - name: Accept
      value: application/json
    - name: Authorization
      value: Bearer {{auth_token}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Get the current user's profile
