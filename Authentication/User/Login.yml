info:
  name: Login
  type: http
  seq: 2

http:
  method: POST
  url: "{{base_url}}/api/v1/auth/login"
  headers:
    - name: Content-Type
      value: application/json
    - name: Accept
      value: application/json
  body:
    type: json
    data: |-
      {
        "email": "rageja8030@naprb.com",
        "password": "Pa$$w0rd!",
        "remember": false
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: "if (res.getStatus() === 200) {\r

        \    const response = res.getBody();\r

        \    if (response.data && response.data.token) {\r

        \        bru.setEnvVar('auth_token', response.data.token);\r

        \    }\r

        }"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Login with user credentials
