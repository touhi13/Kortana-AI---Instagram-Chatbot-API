info:
  name: Reset Password
  type: http
  seq: 8

http:
  method: POST
  url: "{{base_url}}/api/v1/auth/reset-password"
  headers:
    - name: Content-Type
      value: application/json
    - name: Accept
      value: application/json
    - name: Authorization
      value: Bearer {{auth_token}}
  body:
    type: json
    data: |-
      {
        "password": "NewP@ssw0rd",
        "password_confirmation": "NewP@ssw0rd"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: "Step 3 of password reset: Submit new password using the bearer token received from OTP Verify"
