info:
  name: Check Export Status (GDPR)
  type: http
  seq: 14

http:
  method: GET
  url: "{{base_url}}/api/v1/auth/export/{{export_token}}/status"
  headers:
    - name: Authorization
      value: Bearer {{auth_token}}
    - name: Accept
      value: application/json
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: "Check the status of a data export. Returns export_id, token, status, format, requested_at. If completed: includes download_url, expires_at, file_size, completed_at. If failed: includes error message. Replace {{export_token}} with the token from request export response."
