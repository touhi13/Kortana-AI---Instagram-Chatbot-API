info:
  name: Download Data Export (GDPR)
  type: http
  seq: 15

http:
  method: GET
  url: "{{base_url}}/api/v1/auth/export/{{export_token}}/download"
  headers:
    - name: Authorization
      value: Bearer {{auth_token}}
    - name: Accept
      value: application/json
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Download the completed data export file. Returns file download (JSON or ZIP). Export must be in 'completed' status and not expired. Replace {{export_token}} with the token from request export response.
