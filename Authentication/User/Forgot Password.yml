info:
  name: Forgot Password
  type: http
  seq: 7

http:
  method: POST
  url: "{{base_url}}/api/v1/auth/forgot-password"
  headers:
    - name: Content-Type
      value: application/json
    - name: Accept
      value: application/json
  body:
    type: json
    data: |-
      {
        "email": "john.doe@example.com"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: "Step 1 of password reset: Request OTP to be sent to the email. Response includes state_code needed for Resend OTP."
