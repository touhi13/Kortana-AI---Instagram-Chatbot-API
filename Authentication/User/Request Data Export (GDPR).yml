info:
  name: Request Data Export (GDPR)
  type: http
  seq: 13

http:
  method: POST
  url: "{{base_url}}/api/v1/auth/export"
  headers:
    - name: Authorization
      value: Bearer {{auth_token}}
    - name: Content-Type
      value: application/json
    - name: Accept
      value: application/json
  body:
    type: json
    data: |-
      {
        "format": "json",
        "include": {
          "profile": true,
          "messages": true,
          "appointments": true,
          "subscriptions": true,
          "knowledge_files": true,
          "agents": true,
          "platforms": true
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: "Request a data export (GDPR Article 20 - Right to Data Portability). Optional: format (json|zip), include object with boolean flags for profile, messages, appointments, subscriptions, knowledge_files, agents, leads. Returns export_id, token, status, and status_url or download_url."
