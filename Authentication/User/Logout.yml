info:
  name: Logout
  type: http
  seq: 6

http:
  method: POST
  url: "{{base_url}}/api/v1/auth/logout"
  headers:
    - name: Accept
      value: application/json
    - name: Authorization
      value: Bearer {{auth_token}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Logout the current user
