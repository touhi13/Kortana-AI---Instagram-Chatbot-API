info:
  name: Resend OTP
  type: http
  seq: 10

http:
  method: POST
  url: "{{base_url}}/api/v1/auth/resend-otp"
  headers:
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "email": "user@example.com",
        "state_code": "123456"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Resend OTP to email address using state code (no authentication required)
