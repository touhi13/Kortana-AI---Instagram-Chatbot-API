info:
  name: Admin Logout
  type: http
  seq: 2

http:
  method: POST
  url: "{{base_url}}/api/v1/admin/logout"
  headers:
    - name: Accept
      value: application/json
    - name: Authorization
      value: Bearer {{admin_auth_token}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Logout admin user and invalidate admin token
