info:
  name: Update Platform Status (Admin)
  type: http
  seq: 2

http:
  method: PUT
  url: "{{base_url}}/api/v1/admin/platforms/1/update-status"
  headers:
    - name: Authorization
      value: Bearer {{admin_auth_token}}
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "enabled": true
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: "Admin: Update platform status by ID"
