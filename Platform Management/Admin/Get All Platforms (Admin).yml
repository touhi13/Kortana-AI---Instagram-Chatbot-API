info:
  name: Get All Platforms (Admin)
  type: http
  seq: 1

http:
  method: GET
  url: "{{base_url}}/api/v1/admin/platforms"
  headers:
    - name: Authorization
      value: Bearer {{admin_auth_token}}
    - name: Accept
      value: application/json
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: "Admin: Get all platforms including disabled ones"
