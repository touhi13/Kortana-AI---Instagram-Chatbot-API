info:
  name: Disconnect Platform (User)
  type: http
  seq: 2

http:
  method: POST
  url: "{{base_url}}/api/v1/platforms/{{platform_key}}/disconnect"
  headers:
    - name: Authorization
      value: Bearer {{auth_token}}
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  User: Disconnect a connected platform.

  Supported `platform_key` values:
  - instagram
  - whatsapp
  - facebook (Facebook Messenger)

