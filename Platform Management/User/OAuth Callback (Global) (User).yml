info:
  name: OAuth Callback (Global) (User)
  type: http
  seq: 3

http:
  method: POST
  url: "{{base_url}}/api/v1/platforms/oauth/callback"
  headers:
    - name: Authorization
      value: Bearer {{auth_token}}
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
  body:
    type: json
    json:
      code: AUTH_CODE
      state: STATE_VALUE
      user_id: 1
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  Global OAuth callback for platform connections.

  The API decrypts `state` to determine which platform (facebook/instagram) initiated the flow.

