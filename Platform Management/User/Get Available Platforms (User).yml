info:
  name: Get Available Platforms (User)
  type: http
  seq: 1

http:
  method: GET
  url: "{{base_url}}/api/v1/platforms/available"
  headers:
    - name: Authorization
      value: Bearer {{auth_token}}
    - name: Accept
      value: application/json
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: "User: Get all available platforms grouped by category with user connection status"
