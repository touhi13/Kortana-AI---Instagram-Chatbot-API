info:
  name: Checkout
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/api/v1/checkout"
  headers:
    - name: Authorization
      value: Bearer {{auth_token}}
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
          "package_id": 4,
          "billing_cycle": "month"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: "Create Stripe Checkout Session for new subscription. Body: package_id (required|exists:subscription_packages,id). Returns checkout URL to redirect user to Stripe payment page."
