info:
  name: Income Report
  type: http
  seq: 3

http:
  method: GET
  url: "{{base_url}}/api/v1/reports/income?per_page=15&start_date=2025-01-01&end_date=2025-10-18"
  headers:
    - name: Authorization
      value: Bearer {{auth_token}}
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
  params:
    - name: per_page
      value: "15"
      type: query
      description: "Number of items per page (default: 15)"
    - name: page
      value: "1"
      type: query
      description: Page number
      disabled: true
    - name: start_date
      value: 2025-01-01
      type: query
      description: Start date for income analysis (YYYY-MM-DD)
    - name: end_date
      value: 2025-10-18
      type: query
      description: End date for income analysis (YYYY-MM-DD)
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Get income report with pagination, filtering, and metrics. Returns paginated subscription package income grouped by month/year, pagination info, and metrics as array of objects [{title, value}].
