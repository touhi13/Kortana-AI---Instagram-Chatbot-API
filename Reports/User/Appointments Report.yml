info:
  name: Appointments Report
  type: http
  seq: 1

http:
  method: GET
  url: "{{base_url}}/api/v1/reports/appointments?per_page=15&start_date=2025-01-01&end_date=2025-10-18&status=completed&service_name=wrapping&user_agent_id=1&search=john"
  headers:
    - name: Authorization
      value: Bearer {{auth_token}}
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
  params:
    - name: per_page
      value: "15"
      type: query
      description: "Number of items per page (default: 15)"
    - name: page
      value: "1"
      type: query
      description: Page number
      disabled: true
    - name: start_date
      value: 2025-01-01
      type: query
      description: Start date for filtering (YYYY-MM-DD)
    - name: end_date
      value: 2025-10-18
      type: query
      description: End date for filtering (YYYY-MM-DD)
    - name: status
      value: completed
      type: query
      description: Filter by appointment status
    - name: service_name
      value: wrapping
      type: query
      description: Filter by service name
    - name: user_agent_id
      value: "1"
      type: query
      description: Filter by specific user agent
    - name: search
      value: john
      type: query
      description: Search by customer name, email, or service name
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Get comprehensive appointments report with pagination, filtering, and metrics. Returns paginated items, pagination info, and metrics as array of objects [{title, value}].
