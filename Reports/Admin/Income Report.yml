info:
  name: Income Report
  type: http
  seq: 2

http:
  method: GET
  url: "{{base_url}}/api/v1/admin/reports/income"
  headers:
    - name: Authorization
      value: Bearer {{admin_auth_token}}
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
