info:
  name: Get Service Names
  type: http
  seq: 22

http:
  method: GET
  url: "{{base_url}}/api/v1/appointments/services"
  headers:
    - name: Accept
      value: application/json
    - name: Authorization
      value: Bearer {{auth_token}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
