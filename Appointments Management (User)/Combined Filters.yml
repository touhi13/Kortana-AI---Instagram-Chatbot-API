info:
  name: Combined Filters
  type: http
  seq: 9

http:
  method: GET
  url: "{{base_url}}/api/v1/appointments?status=pending&platform=instagram&date=2025-08-05&per_page=20"
  headers:
    - name: Authorization
      value: Bearer {{auth_token}}
    - name: Accept
      value: application/json
  params:
    - name: status
      value: pending
      type: query
      description: Filter by status
    - name: platform
      value: instagram
      type: query
      description: Filter by platform
    - name: date
      value: 2025-08-05
      type: query
      description: Filter by specific date
    - name: per_page
      value: "20"
      type: query
      description: Items per page
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Example of combining multiple filters
