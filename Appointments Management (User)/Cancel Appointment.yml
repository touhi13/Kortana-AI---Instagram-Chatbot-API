info:
  name: Cancel Appointment
  type: http
  seq: 14

http:
  method: PUT
  url: "{{base_url}}/api/v1/appointments/1/status"
  headers:
    - name: Authorization
      value: Bearer {{auth_token}}
    - name: Content-Type
      value: application/json
    - name: Accept
      value: application/json
  body:
    type: json
    data: |-
      {
        "status": "cancelled",
        "notes": "Customer requested cancellation due to schedule conflict"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Cancel an appointment using universal status endpoint
