info:
  name: Today's Appointments
  type: http
  seq: 6

http:
  method: GET
  url: "{{base_url}}/api/v1/appointments?type=today"
  headers:
    - name: Authorization
      value: Bearer {{auth_token}}
    - name: Accept
      value: application/json
  params:
    - name: type
      value: today
      type: query
      description: Get today's appointments only
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Get all appointments for today
