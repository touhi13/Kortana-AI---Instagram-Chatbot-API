info:
  name: Create Appointment
  type: http
  seq: 10

http:
  method: POST
  url: "{{base_url}}/api/v1/appointments"
  headers:
    - name: Authorization
      value: Bearer {{auth_token}}
    - name: Content-Type
      value: application/json
    - name: Accept
      value: application/json
  body:
    type: json
    data: |-
      {
        "customer_name": "John Doe",
        "customer_phone": "+1234567890",
        "customer_email": "john@example.com",
        "appointment_date": "2025-11-6",
        "appointment_time": "14:00",
        "service_name": "Full Vehicle Wrap",
        "notes": "Customer wants red color wrap"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Create a new appointment
