info:
  name: Complete Appointment
  type: http
  seq: 15

http:
  method: PUT
  url: "{{base_url}}/api/v1/appointments/1/status"
  headers:
    - name: Authorization
      value: Bearer {{auth_token}}
    - name: Content-Type
      value: application/json
    - name: Accept
      value: application/json
  body:
    type: json
    data: |-
      {
        "status": "completed",
        "notes": "Service completed successfully. Customer satisfied with the result."
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Mark appointment as completed using universal status endpoint
