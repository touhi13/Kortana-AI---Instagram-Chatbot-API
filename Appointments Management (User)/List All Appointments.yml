info:
  name: List All Appointments
  type: http
  seq: 1

http:
  method: GET
  url: "{{base_url}}/api/v1/appointments"
  headers:
    - name: Authorization
      value: Bearer {{auth_token}}
    - name: Accept
      value: application/json
  params:
    - name: date
      value: 2025-08-05
      type: query
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Get all appointments with pagination support for infinite scrolling
