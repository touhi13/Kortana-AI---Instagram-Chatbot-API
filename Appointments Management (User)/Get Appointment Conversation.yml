info:
  name: Get Appointment Conversation
  type: http
  seq: 20

http:
  method: GET
  url: "{{base_url}}/api/v1/appointments/1/conversation"
  headers:
    - name: Authorization
      value: Bearer {{auth_token}}
    - name: Accept
      value: application/json
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Get the complete conversation that led to this appointment. Returns conversation metadata, message history, and conversation flow analysis. This endpoint retrieves all messages linked to the appointment via conversation_session_id and provides insights into the customer journey from initial inquiry to booking confirmation.
