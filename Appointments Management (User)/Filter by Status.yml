info:
  name: Filter by Status
  type: http
  seq: 3

http:
  method: GET
  url: "{{base_url}}/api/v1/appointments?status=pending&per_page=15"
  headers:
    - name: Authorization
      value: Bearer {{auth_token}}
    - name: Accept
      value: application/json
  params:
    - name: status
      value: pending
      type: query
      description: "Filter by status: pending, confirmed, in_progress, completed, cancelled, no_show"
    - name: per_page
      value: "15"
      type: query
      description: Items per page
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Filter appointments by status
