info:
  name: Get Dates with Appointments
  type: http
  seq: 23

http:
  method: GET
  url: "{{base_url}}/api/v1/appointments/dates"
  headers:
    - name: Accept
      value: application/json
    - name: Authorization
      value: Bearer {{auth_token}}
  params:
    - name: start_date
      value: 2026-01-01
      type: query
      description: "Optional: Filter from this date (YYYY-MM-DD)"
      disabled: true
    - name: end_date
      value: 2026-01-31
      type: query
      description: "Optional: Filter until this date (YYYY-MM-DD)"
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Get all dates that have appointments. Returns an array of dates (YYYY-MM-DD format) that have at least one appointment for the authenticated user. Optional date range filters can be applied.
