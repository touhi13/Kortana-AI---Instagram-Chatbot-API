info:
  name: Update Appointment
  type: http
  seq: 12

http:
  method: PUT
  url: "{{base_url}}/api/v1/appointments/1"
  headers:
    - name: Authorization
      value: Bearer {{auth_token}}
    - name: Content-Type
      value: application/json
    - name: Accept
      value: application/json
  body:
    type: json
    data: |-
      {
        "customer_name": "John Smith",
        "customer_phone": "+1234567891",
        "appointment_date": "2025-08-16",
        "appointment_time": "15:00",
        "notes": "Updated: Customer wants blue color wrap instead",
        "service_price": 2600.00
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Update an existing appointment
