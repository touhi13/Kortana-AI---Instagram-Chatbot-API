info:
  name: Appointment Statistics
  type: http
  seq: 8

http:
  method: GET
  url: "{{base_url}}/api/v1/appointments?type=stats"
  headers:
    - name: Authorization
      value: Bearer {{auth_token}}
    - name: Accept
      value: application/json
  params:
    - name: type
      value: stats
      type: query
      description: Get appointment statistics
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Get appointment statistics for dashboard
