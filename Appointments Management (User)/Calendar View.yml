info:
  name: Calendar View
  type: http
  seq: 7

http:
  method: GET
  url: "{{base_url}}/api/v1/appointments?type=calendar&month=8&year=2025"
  headers:
    - name: Authorization
      value: Bearer {{auth_token}}
    - name: Accept
      value: application/json
  params:
    - name: type
      value: calendar
      type: query
      description: Calendar view type
    - name: month
      value: "8"
      type: query
      description: Month (1-12)
    - name: year
      value: "2025"
      type: query
      description: Year
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Get appointments formatted for calendar display
