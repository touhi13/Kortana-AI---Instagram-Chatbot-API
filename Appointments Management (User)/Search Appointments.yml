info:
  name: Search Appointments
  type: http
  seq: 2

http:
  method: GET
  url: "{{base_url}}/api/v1/appointments?type=search&search=john&per_page=15"
  headers:
    - name: Authorization
      value: Bearer {{auth_token}}
    - name: Accept
      value: application/json
  params:
    - name: type
      value: search
      type: query
      description: "Query type: search"
    - name: search
      value: john
      type: query
      description: Search term for customer name, service, notes
    - name: per_page
      value: "15"
      type: query
      description: Items per page
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Search appointments by customer name, service, or notes
