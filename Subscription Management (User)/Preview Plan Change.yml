info:
  name: Preview Plan Change
  type: http
  seq: 6

http:
  method: POST
  url: "{{base_url}}/api/v1/subscription/preview-change"
  headers:
    - name: Authorization
      value: Bearer {{auth_token}}
    - name: Content-Type
      value: application/json
    - name: Accept
      value: application/json
  body:
    type: json
    data: |-
      {
        "package_id": 3
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Preview plan change with proration details.

  Body:
  - package_id (required|integer): The new package ID
  - immediate (required|boolean): Preview immediate or scheduled change

  Returns: type (upgrade|downgrade), new_package, warnings, proration details (for immediate upgrades), and effective_date (for scheduled changes).
