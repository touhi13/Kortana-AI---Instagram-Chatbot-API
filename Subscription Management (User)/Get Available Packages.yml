info:
  name: Get Available Packages
  type: http
  seq: 4

http:
  method: GET
  url: "{{base_url}}/api/v1/subscription/packages"
  headers:
    - name: Authorization
      value: Bearer {{auth_token}}
    - name: Accept
      value: application/json
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Get all available active subscription packages ordered by sort_order.
