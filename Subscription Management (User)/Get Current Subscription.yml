info:
  name: Get Current Subscription
  type: http
  seq: 1

http:
  method: GET
  url: "{{base_url}}/api/v1/subscription/current"
  headers:
    - name: Authorization
      value: Bearer {{auth_token}}
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Get current subscription details. Returns has_subscription (boolean) and subscription object if active.
