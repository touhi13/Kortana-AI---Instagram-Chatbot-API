info:
  name: Get Payment History
  type: http
  seq: 3

http:
  method: GET
  url: "{{base_url}}/api/v1/subscription/history?per_page=10"
  headers:
    - name: Authorization
      value: Bearer {{auth_token}}
    - name: Accept
      value: application/json
  params:
    - name: per_page
      value: "10"
      type: query
      description: "Number of items per page (default: 10)"
    - name: cursor
      value: ""
      type: query
      description: Cursor for pagination (use next_cursor from previous response)
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: "Get paginated payment history from Stripe. Query params: per_page (default: 10), cursor (optional, for next page). Returns: { items: [{ id, date, amount, currency, status, invoice_pdf, number }], paginate: { per_page, has_more, next_cursor } }"
