info:
  name: POST FAQ
  type: http
  seq: 3

http:
  method: POST
  url: "{{base_url}}/api/v1/admin/faqs"
  headers:
    - name: Authorization
      value: Bearer {{admin_auth_token}}
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: "{\r

      \    \"question\": \"Task?\",\r

      \    \"answer\": \"Appointment\",\r

      \    \"is_active\": true,\r

      \    \"order\": 1\r

      }"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
