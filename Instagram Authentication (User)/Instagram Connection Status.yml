info:
  name: Instagram Connection Status
  type: http
  seq: 3

http:
  method: GET
  url: "{{base_url}}/api/auth/instagram/status"
  headers:
    - name: Authorization
      value: Bearer {{auth_token}}
    - name: Accept
      value: application/json
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
