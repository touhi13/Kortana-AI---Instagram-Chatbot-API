info:
  name: Instagram OAuth Redirect
  type: http
  seq: 1

http:
  method: GET
  url: "{{base_url}}/api/auth/instagram"
  headers:
    - name: Authorization
      value: Bearer {{auth_token}}
    - name: Accept
      value: application/json
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
