info:
  name: Instagram OAuth Callback
  type: http
  seq: 2

http:
  method: GET
  url: "{{base_url}}/api/auth/instagram/callback?code=AUTH_CODE&state=STATE_VALUE"
  headers:
    - name: Authorization
      value: Bearer {{auth_token}}
    - name: Accept
      value: application/json
  params:
    - name: code
      value: AUTH_CODE
      type: query
    - name: state
      value: STATE_VALUE
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
