info:
  name: Refresh Instagram Token
  type: http
  seq: 5

http:
  method: POST
  url: "{{base_url}}/api/auth/instagram/refresh"
  headers:
    - name: Authorization
      value: Bearer {{auth_token}}
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
