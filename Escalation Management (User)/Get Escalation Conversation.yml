http:
  method: GET
  url: "{{base_url}}/api/v1/escalations/1/conversation"
  headers:
    - name: Authorization
      value: Bearer {{auth_token}}
    - name: Accept
      value: application/json
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Get the full conversation history for an escalation
