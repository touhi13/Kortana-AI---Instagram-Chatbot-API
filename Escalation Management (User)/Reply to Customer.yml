info:
  name: Reply to Customer
  type: http
  seq: 4

http:
  method: POST
  url: "{{base_url}}/api/v1/escalations/1/reply"
  headers:
    - name: Authorization
      value: Bearer {{auth_token}}
    - name: Content-Type
      value: application/json
    - name: Accept
      value: application/json
  body:
    type: json
    data: |-
      {
        "message": "Thank you for your patience. I'm looking into your request and will get back to you shortly."
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Send a reply message to the customer via Instagram
