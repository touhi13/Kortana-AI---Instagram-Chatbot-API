info:
  name: List Escalations
  type: http
  seq: 1

http:
  method: GET
  url: "{{base_url}}/api/v1/escalations?per_page=15&status=active&escalation_type=auto&escalation_reason=timeout&date_from=2025-01-01&date_to=2025-12-31&search=customer123"
  headers:
    - name: Authorization
      value: Bearer {{auth_token}}
    - name: Accept
      value: application/json
  params:
    - name: per_page
      value: "15"
      type: query
    - name: status
      value: active
      type: query
    - name: escalation_type
      value: auto
      type: query
    - name: escalation_reason
      value: timeout
      type: query
    - name: date_from
      value: 2025-01-01
      type: query
    - name: date_to
      value: 2025-12-31
      type: query
    - name: search
      value: customer123
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Get paginated list of escalations with filtering and optional statistics
