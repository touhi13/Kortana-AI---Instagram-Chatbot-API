info:
  name: Get Connection Status
  type: http
  seq: 1

http:
  method: GET
  url: "{{base_url}}/api/v1/admin/google-calendar/status"
  headers:
    - name: Accept
      value: application/json
    - name: Authorization
      value: Bearer {{admin_auth_token}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Check if Google Calendar is connected for the authenticated admin
