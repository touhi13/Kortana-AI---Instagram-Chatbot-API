info:
  name: Calendly Disconnect
  type: http
  seq: 4

http:
  method: POST
  url: "{{base_url}}/api/v1/auth/calendly/disconnect"
  headers:
    - name: Authorization
      value: Bearer {{auth_token}}
    - name: Content-Type
      value: application/json
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
