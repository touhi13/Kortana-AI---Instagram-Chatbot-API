info:
  name: Calendly Callback
  type: http
  seq: 4

http:
  method: GET
  url: "{{base_url}}/api/v1/auth/calendly/status"
  headers:
    - name: Accept
      value: application/json
    - name: Authorization
      value: Bearer {{auth_token}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
