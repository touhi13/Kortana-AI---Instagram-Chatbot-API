info:
  name: Calendar Connect
  type: http
  seq: 2

http:
  method: GET
  url: "{{base_url}}/api/v1/auth/google-calendar/auth-url"
  headers:
    - name: Authorization
      value: Bearer {{auth_token}}
    - name: Content-Type
      value: application/json
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
