info:
  name: Google Callback
  type: http
  seq: 1

http:
  method: GET
  url: "{{base_url}}/api/v1/auth/google-calendar/status"
  headers:
    - name: Accept
      value: application/json
    - name: Authorization
      value: Bearer {{auth_token}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
