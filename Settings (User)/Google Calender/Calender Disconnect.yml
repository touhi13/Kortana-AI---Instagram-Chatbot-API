info:
  name: Calender Disconnect
  type: http
  seq: 3

http:
  method: POST
  url: "{{base_url}}/api/v1/auth/google-calendar/disconnect"
  headers:
    - name: Authorization
      value: Bearer {{auth_token}}
    - name: Content-Type
      value: application/json
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
