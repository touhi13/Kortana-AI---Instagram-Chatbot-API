info:
  name: Create Discount
  type: http
  seq: 3

http:
  method: POST
  url: "{{base_url}}/api/v1/admin/discounts"
  headers:
    - name: Authorization
      value: Bearer {{admin_auth_token}}
    - name: Content-Type
      value: application/json
    - name: Accept
      value: application/json
  body:
    type: json
    data: |-
      {
          "name": "New Year Sale",
          "amount_off": null,
          "percent_off": 20,
          "currency": "usd",
          "duration": "once",
          "duration_in_months": null,
          "is_active": true
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
