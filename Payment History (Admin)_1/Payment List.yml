info:
  name: Payment List
  type: http
  seq: 2

http:
  method: GET
  url: "{{base_url}}/api/v1/admin/payments?search=&status=&package_id=&billing_cycle=&per_page=15"
  headers:
    - name: Authorization
      value: Bearer {{admin_auth_token}}
    - name: Accept
      value: application/json
  params:
    - name: search
      value: ""
      type: query
    - name: status
      value: ""
      type: query
    - name: package_id
      value: ""
      type: query
    - name: billing_cycle
      value: ""
      type: query
    - name: per_page
      value: "15"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
