info:
  name: Income Report (with Metrics)
  type: http
  seq: 1

http:
  method: GET
  url: "{{base_url}}/api/v1/admin/reports/income?date=&search=&per_page=15"
  headers:
    - name: Authorization
      value: Bearer {{admin_auth_token}}
    - name: Accept
      value: application/json
  params:
    - name: date
      value: ""
      type: query
      description: "Format: YYYY-MM"
    - name: search
      value: ""
      type: query
      description: Search by package ID
    - name: per_page
      value: "15"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
