info:
  name: Update Subscription Settings
  type: http
  seq: 2

http:
  method: PUT
  url: "{{base_url}}/api/v1/admin/setting"
  headers:
    - name: Authorization
      value: Bearer {{admin_auth_token}}
    - name: Content-Type
      value: application/json
    - name: Accept
      value: application/json
  body:
    type: json
    data: |-
      {
        "is_trial_active": 1,
        "trial_period": 14,
        "trial_warning_days": 3,
        "frontend_checkout_enabled": 1
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: "Update subscription/trial settings. All fields are optional (sometimes). Validation: is_trial_active (boolean), trial_period (0-365 days), trial_warning_days (0-30 days, must be less than trial_period), frontend_checkout_enabled (boolean)"
