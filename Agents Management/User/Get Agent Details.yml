info:
  name: Get Agent Details
  type: http
  seq: 2

http:
  method: GET
  url: "{{base_url}}/api/v1/agents/1"
  headers:
    - name: Authorization
      value: Bearer {{auth_token}}
    - name: Accept
      value: application/json
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: "Get details of a specific agent (returns: name, key, description, is_active, is_subscribed)"
