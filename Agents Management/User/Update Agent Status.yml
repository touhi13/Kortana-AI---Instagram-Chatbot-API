info:
  name: Update Agent Status
  type: http
  seq: 3

http:
  method: PUT
  url: "{{base_url}}/api/v1/agents/1/status"
  headers:
    - name: Authorization
      value: Bearer {{auth_token}}
    - name: Content-Type
      value: application/json
    - name: Accept
      value: application/json
  body:
    type: json
    data: |-
      {
          "is_active": false
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: "Update agent status (activate/deactivate) - returns: name, key, description, is_active, is_subscribed"
