info:
  name: Get All Agents
  type: http
  seq: 1

http:
  method: GET
  url: "{{base_url}}/api/v1/agents?per_page=10&page=1&active=true&search=booking&all=false"
  headers:
    - name: Authorization
      value: Bearer {{auth_token}}
    - name: Accept
      value: application/json
  params:
    - name: per_page
      value: "10"
      type: query
      description: "Number of items per page (default: 15)"
    - name: page
      value: "1"
      type: query
      description: Page number
    - name: active
      value: "true"
      type: query
      description: Filter by active status (true/false)
    - name: search
      value: booking
      type: query
      description: Search by name, key, or description
    - name: all
      value: "false"
      type: query
      description: Get all data without pagination (true/false)
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: "Get all available agent types with filtering and pagination options. Returns: name, key, description, is_active, is_subscribed (for authenticated user)"
