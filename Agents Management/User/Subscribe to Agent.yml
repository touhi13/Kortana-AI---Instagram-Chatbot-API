info:
  name: Subscribe to Agent
  type: http
  seq: 4

http:
  method: POST
  url: "{{base_url}}/api/v1/agents/subscribe"
  headers:
    - name: Authorization
      value: Bearer {{auth_token}}
    - name: Content-Type
      value: application/json
    - name: Accept
      value: application/json
  body:
    type: json
    data: |-
      {
          "agent_id": 1
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: "Subscribe to an agent type - returns: name, key, description, is_active, is_subscribed"
