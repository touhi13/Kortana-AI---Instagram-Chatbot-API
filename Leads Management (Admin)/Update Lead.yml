info:
  name: Update Lead
  type: http
  seq: 4

http:
  method: PUT
  url: "{{base_url}}/api/v1/admin/leads/1"
  headers:
    - name: Content-Type
      value: application/json
    - name: Accept
      value: application/json
    - name: Authorization
      value: Bearer {{admin_auth_token}}
  body:
    type: json
    data: |-
      {
        "first_name": "John",
        "last_name": "Smith",
        "email": "john.smith@example.com",
        "message": "Updated message",
        "meeting_duration": 45,
        "notes": "VIP customer, needs demo of premium features"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Update lead information
