info:
  name: Resend Booking Link
  type: http
  seq: 8

http:
  method: POST
  url: "{{base_url}}/api/v1/admin/leads/1/resend-booking-link"
  headers:
    - name: Accept
      value: application/json
    - name: Authorization
      value: Bearer {{admin_auth_token}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Resend booking link email to lead. If token has expired, a new one will be generated.
