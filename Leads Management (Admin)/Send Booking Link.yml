info:
  name: Send Booking Link
  type: http
  seq: 7

http:
  method: POST
  url: "{{base_url}}/api/v1/admin/leads/1/send-booking-link"
  headers:
    - name: Content-Type
      value: application/json
    - name: Accept
      value: application/json
    - name: Authorization
      value: Bearer {{admin_auth_token}}
  body:
    type: json
    data: |-
      {
        "duration": 30
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: "if (res.getStatus() === 200) {\r

        \    const response = res.getBody();\r

        \    if (response.data && response.data.booking && response.data.booking.has_booking_token) {\r

        \        // Token is returned for testing purposes\r

        \        console.log('Booking link sent successfully');\r

        \    }\r

        }"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Send booking link email to lead. Requires Google Calendar to be connected. Duration is in minutes (15, 30, 45, 60).
