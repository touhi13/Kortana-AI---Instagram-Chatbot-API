info:
  name: Get Consent Preferences
  type: http
  seq: 1

http:
  method: GET
  url: "{{base_url}}/api/v1/consent/preferences"
  headers:
    - name: Authorization
      value: Bearer {{auth_token}}
    - name: Accept
      value: application/json
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Get user's current consent preferences including cookie preferences, email marketing, service notifications, and legal document acceptance status (Privacy Policy, Terms, DPA).
