info:
  name: Update Consent Preferences
  type: http
  seq: 2

http:
  method: PUT
  url: "{{base_url}}/api/v1/consent/preferences"
  headers:
    - name: Authorization
      value: Bearer {{auth_token}}
    - name: Content-Type
      value: application/json
    - name: Accept
      value: application/json
  body:
    type: json
    data: |-
      {
        "functional_cookies": true,
        "analytics_cookies": true,
        "email_marketing": true,
        "service_notifications": true
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: "Update user's consent preferences. All fields are optional (sometimes|boolean): functional_cookies, analytics_cookies, email_marketing, service_notifications"
