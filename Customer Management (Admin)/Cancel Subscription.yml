info:
  name: Cancel Subscription
  type: http
  seq: 7

http:
  method: POST
  url: "{{base_url}}/api/v1/admin/customers/1/cancel-subscription"
  headers:
    - name: Authorization
      value: Bearer {{admin_auth_token}}
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "subscription_id": 1,
        "reason": "Customer requested cancellation due to budget constraints"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: "Admin: Cancel a customer's subscription"
