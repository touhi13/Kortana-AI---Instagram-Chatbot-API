info:
  name: Get Unread Notifications (User)
  type: http
  seq: 2

http:
  method: GET
  url: "{{base_url}}/api/v1/shared/notifications?unread_only=true&per_page=20"
  headers:
    - name: Authorization
      value: Bearer {{auth_token}}
    - name: Accept
      value: application/json
  params:
    - name: unread_only
      value: "true"
      type: query
      description: Show only unread notifications
    - name: per_page
      value: "20"
      type: query
      description: Number of notifications per page
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: "User: Get only unread notifications"
