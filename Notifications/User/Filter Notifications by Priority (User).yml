info:
  name: Filter Notifications by Priority (User)
  type: http
  seq: 3

http:
  method: GET
  url: "{{base_url}}/api/v1/shared/notifications?priority=high&status=pending"
  headers:
    - name: Authorization
      value: Bearer {{auth_token}}
    - name: Accept
      value: application/json
  params:
    - name: priority
      value: high
      type: query
      description: "Filter by priority: low, normal, high, urgent"
    - name: status
      value: pending
      type: query
      description: "Filter by status: pending, sent, failed, read"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: "User: Filter notifications by priority and status"
