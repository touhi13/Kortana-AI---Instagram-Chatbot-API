info:
  name: Get All Notifications (User)
  type: http
  seq: 1

http:
  method: GET
  url: "{{base_url}}/api/v1/shared/notifications?per_page=15&page=1"
  headers:
    - name: Authorization
      value: Bearer {{auth_token}}
    - name: Accept
      value: application/json
  params:
    - name: per_page
      value: "15"
      type: query
      description: "Number of notifications per page (default: 15)"
    - name: page
      value: "1"
      type: query
      description: Page number
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: "User: Get all notifications with pagination"
