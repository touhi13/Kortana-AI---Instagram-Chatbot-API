info:
  name: Get Unread Count (User)
  type: http
  seq: 4

http:
  method: GET
  url: "{{base_url}}/api/v1/shared/notifications/unread-count"
  headers:
    - name: Authorization
      value: Bearer {{auth_token}}
    - name: Accept
      value: application/json
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: "User: Get unread notifications count for UI badges"
