info:
  name: Get System Alerts (Admin)
  type: http
  seq: 2

http:
  method: GET
  url: "{{base_url}}/api/v1/shared/notifications?type=system_alert&priority=urgent"
  headers:
    - name: Authorization
      value: Bearer {{admin_auth_token}}
    - name: Accept
      value: application/json
  params:
    - name: type
      value: system_alert
      type: query
      description: Filter by notification type
    - name: priority
      value: urgent
      type: query
      description: "Filter by priority: low, normal, high, urgent"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: "Admin: Get urgent system alerts"
