info:
  name: Get Unread Count (Admin)
  type: http
  seq: 3

http:
  method: GET
  url: "{{base_url}}/api/v1/shared/notifications/unread-count"
  headers:
    - name: Authorization
      value: Bearer {{admin_auth_token}}
    - name: Accept
      value: application/json
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: "Admin: Get unread notifications count for admin dashboard"
