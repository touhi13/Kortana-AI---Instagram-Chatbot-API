info:
  name: Impersonation History
  type: http
  seq: 3

http:
  method: GET
  url: "{{base_url}}/api/v1/admin/impersonate/history"
  headers:
    - name: Accept
      value: application/json
    - name: Authorization
      value: Bearer {{admin_auth_token}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Get impersonation history. Requires admin auth token.
