info:
  name: Impersonation Status
  type: http
  seq: 2

http:
  method: GET
  url: "{{base_url}}/api/v1/admin/impersonate/status"
  headers:
    - name: Accept
      value: application/json
    - name: Authorization
      value: Bearer {{admin_auth_token}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Get current impersonation status. Requires admin auth token.
