info:
  name: Facebook OAuth Redirect
  type: http
  seq: 1

http:
  method: GET
  url: "{{base_url}}/api/v1/auth/facebook"
  headers:
    - name: Authorization
      value: Bearer {{auth_token}}
    - name: Accept
      value: application/json
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  Starts Facebook (Messenger) OAuth for the authenticated user.

